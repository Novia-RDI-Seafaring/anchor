# MkDocs configuration for the ANCHOR documentation site.
#
# Live preview: `uv run --extra docs mkdocs serve` (http://127.0.0.1:8000)
# Static build: `uv run --extra docs mkdocs build` → site/
# Deploy:        runs from .github/workflows/docs.yml on push to main.
#
# The site is published to https://novia-rdi-seafaring.github.io/anchor/

site_name: ANCHOR
site_description: ANCHOR, Agent-Native Canvas to Help Organize Resources for traceable engineering document extraction.
site_url: https://novia-rdi-seafaring.github.io/anchor/
site_author: Novia RDI Seafaring
repo_name: Novia-RDI-Seafaring/anchor
repo_url: https://github.com/Novia-RDI-Seafaring/anchor
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Novia University of Applied Sciences. MIT licensed.

docs_dir: docs

# Files that live under docs/ for editor convenience but aren't part of
# the published site: internal design proposals, drafts, etc.
exclude_docs: |
  proposals/*

theme:
  name: material
  language: en
  logo: assets/branding/anchor_px.svg
  icon:
    repo: fontawesome/brands/github
  favicon: assets/branding/favicon-32x32.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode: monochrome to match the architecture diagrams.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode: inverted, white on near-black.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs              # top-level sections as tabs
    - navigation.tabs.sticky
    - navigation.sections          # section labels in the sidebar
    - navigation.expand            # expand the active section
    - navigation.top               # back-to-top button
    - navigation.indexes           # section-level index.md files
    - navigation.footer            # prev/next links at page foot
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy            # copy button on code blocks
    - content.code.annotate
    - content.tabs.link            # tab selection persists across pages
    - content.action.edit          # "edit this page" pencil
    - toc.follow                   # right-side TOC scrolls with the page

extra_css:
  - assets/styles/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Novia-RDI-Seafaring/anchor
    - icon: fontawesome/solid/cube
      link: https://pypi.org/project/anchor-kb/

markdown_extensions:
  # Admonitions: !!! note / !!! warning / !!! tip / etc.
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  # Tabbed content: === "uv" / === "pip" / === "pipx"
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      title: On this page

# Navigation order for the public documentation site.
nav:
  - Home: index.md
  - Get started:
    - Install: getting-started/installation.md
    - Tutorial: getting-started/tutorial.md
  - Guides:
    - Working with documents and canvases: guides/documents-and-canvases.md
    - Agent setup: guides/agent-setup.md
    - Agent configuration: guides/agent-configuration.md
    - Azure OpenAI test-drive: guides/azure-test-drive.md
  - Concepts:
    - Projects: concepts/projects.md
    - Agent Experience (AX): concepts/agent-experience.md
    - Architecture: concepts/architecture.md
    - Data and events: concepts/data-and-events.md
    - Extensions and OIP: concepts/extensions-and-oip.md
    - On-disk substrate: concepts/on-disk-substrate.md
    - Canvas: concepts/canvas.md
    - Many interfaces: concepts/interfaces.md
  - Reference:
    - CLI: reference/cli.md
    - MCP tools: reference/mcp.md
    - Configuration: reference/configuration.md
    - Releases: reference/releases.md
    - Citation and acknowledgments: reference/citation.md
