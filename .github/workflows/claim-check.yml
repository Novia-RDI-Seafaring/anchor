# Advisory claim-before-work check.
#
# When a PR opens, resolve its linked issue (Closes/Fixes/Resolves #N
# in the body, plus GitHub's own closingIssuesReferences) and check the
# issue was claimed: assigned to the PR author. On a miss, post (or
# update) a single warning comment and add the `unclaimed` label. On a
# satisfied claim, remove `unclaimed` if it lingers.
#
# This is ADVISORY. It never blocks merge. The job always exits 0 and is
# not wired into required checks. It only signals via comment + label.
# See AGENTS.md "Claiming work" for the ritual and its assumptions.
#
# A PR with no linked issue (chores) is a clean skip — no warning.

name: claim-check

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claim-check:
    runs-on: ubuntu-latest
    steps:
      - name: Advisory claim verification
        uses: actions/github-script@v7
        with:
          script: |
            const MARKER = '<!-- claim-check -->';
            const LABEL = 'unclaimed';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const author = pr.user.login;

            // --- Resolve the linked issue -----------------------------
            // Source 1: GitHub's own "closingIssuesReferences" (the
            // linked-issue UI, populated from Closes/Fixes/Resolves).
            // Source 2: parse the PR body ourselves as a fallback, since
            // the GraphQL field can lag right after open.
            const linked = new Set();

            try {
              const gql = await github.graphql(
                `query($owner:String!, $repo:String!, $number:Int!) {
                   repository(owner:$owner, name:$repo) {
                     pullRequest(number:$number) {
                       closingIssuesReferences(first: 20) {
                         nodes { number }
                       }
                     }
                   }
                 }`,
                { owner, repo, number: prNumber }
              );
              const nodes =
                gql.repository.pullRequest.closingIssuesReferences.nodes || [];
              for (const n of nodes) linked.add(n.number);
            } catch (err) {
              core.warning(`closingIssuesReferences lookup failed: ${err.message}`);
            }

            const body = pr.body || '';
            // Match "Closes #12", "fixes: #12", "resolve #12", and the
            // org/repo#12 form (same repo only).
            const re = new RegExp(
              '\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\b' +
              '[:\\s]+' +
              '(?:' + owner + '\\/' + repo + ')?#(\\d+)',
              'gi'
            );
            let m;
            while ((m = re.exec(body)) !== null) {
              linked.add(parseInt(m[1], 10));
            }

            if (linked.size === 0) {
              core.info(
                'No linked issue (Closes #N) on this PR. Treating as a ' +
                'chore. No claim check, no warning.'
              );
              return;
            }

            const issues = [...linked].sort((a, b) => a - b);
            core.info(`Linked issue(s): ${issues.map((n) => '#' + n).join(', ')}`);

            // --- Branch first-commit time (best-effort, advisory) -----
            // We compare the issue's assignment-event time to the first
            // commit on the branch when we can get both. We never fail
            // the job on this; it only enriches the log + comment.
            let firstCommitDate = null;
            try {
              const commits = await github.paginate(
                github.rest.pulls.listCommits,
                { owner, repo, pull_number: prNumber, per_page: 100 }
              );
              if (commits.length > 0) {
                const c = commits[0].commit;
                firstCommitDate = new Date(
                  (c.author && c.author.date) ||
                  (c.committer && c.committer.date)
                );
              }
            } catch (err) {
              core.warning(`listCommits failed: ${err.message}`);
            }

            // --- Per-issue claim check --------------------------------
            // Claim is satisfied if the PR author is currently among the
            // issue's assignees. If we can read assignment-event timing,
            // we additionally note whether the claim predates the first
            // commit, but this never changes pass/fail (advisory).
            const reasons = [];
            let anyClaimed = false;

            for (const issueNumber of issues) {
              let issue;
              try {
                const resp = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber,
                });
                issue = resp.data;
              } catch (err) {
                core.warning(`Could not read #${issueNumber}: ${err.message}`);
                reasons.push(
                  `#${issueNumber}: could not be read (skipped).`
                );
                continue;
              }

              // A PR can legitimately link a PR number; skip those.
              if (issue.pull_request) {
                core.info(`#${issueNumber} is a PR, not an issue; skipping.`);
                continue;
              }

              const assignees = (issue.assignees || []).map((a) => a.login);
              const assignedToAuthor = assignees.includes(author);

              if (!assignedToAuthor) {
                reasons.push(
                  `#${issueNumber} is not assigned to the PR author ` +
                  `(@${author}). ` +
                  (assignees.length
                    ? `Current assignees: ${assignees.map((a) => '@' + a).join(', ')}.`
                    : `It has no assignee.`)
                );
                continue;
              }

              anyClaimed = true;

              // Best-effort timing note via the issue timeline.
              if (firstCommitDate) {
                try {
                  const events = await github.paginate(
                    github.rest.issues.listEventsForTimeline,
                    { owner, repo, issue_number: issueNumber, per_page: 100 }
                  );
                  const assignEvents = events.filter(
                    (e) =>
                      e.event === 'assigned' &&
                      e.assignee &&
                      e.assignee.login === author &&
                      e.created_at
                  );
                  if (assignEvents.length > 0) {
                    const firstAssign = new Date(
                      assignEvents
                        .map((e) => new Date(e.created_at))
                        .sort((a, b) => a - b)[0]
                    );
                    if (firstAssign > firstCommitDate) {
                      reasons.push(
                        `#${issueNumber} is claimed by @${author}, but the ` +
                        `claim (assignment) at ${firstAssign.toISOString()} ` +
                        `came after the branch's first commit at ` +
                        `${firstCommitDate.toISOString()}. Claim before work, ` +
                        `not after. (Advisory only.)`
                      );
                    } else {
                      core.info(
                        `#${issueNumber}: claim predates first commit. Good.`
                      );
                    }
                  } else {
                    core.info(
                      `#${issueNumber}: no assignment event found for ` +
                      `@${author}; cannot compare timing (advisory).`
                    );
                  }
                } catch (err) {
                  core.warning(
                    `timeline lookup for #${issueNumber} failed: ${err.message}`
                  );
                }
              }
            }

            // A claim is "satisfied" when at least one linked issue is
            // assigned to the author AND there are no outstanding reasons
            // (no unassigned issue, no after-the-fact claim note).
            const satisfied = anyClaimed && reasons.length === 0;

            // --- Find an existing bot comment (idempotency) -----------
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: prNumber, per_page: 100 }
            );
            const existing = comments.find(
              (c) => c.body && c.body.includes(MARKER)
            );

            // --- Helpers ----------------------------------------------
            async function ensureLabelExists() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: LABEL });
              } catch (err) {
                if (err.status === 404) {
                  try {
                    await github.rest.issues.createLabel({
                      owner, repo, name: LABEL, color: 'e99695',
                      description:
                        "PR's linked issue was not claimed before work began; advisory only",
                    });
                    core.info(`Created missing label '${LABEL}'.`);
                  } catch (createErr) {
                    core.warning(`Could not create label: ${createErr.message}`);
                  }
                } else {
                  core.warning(`getLabel failed: ${err.message}`);
                }
              }
            }

            async function addLabel() {
              await ensureLabelExists();
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [LABEL],
                });
              } catch (err) {
                core.warning(`addLabels failed: ${err.message}`);
              }
            }

            async function removeLabel() {
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: LABEL,
                });
                core.info(`Removed '${LABEL}' label.`);
              } catch (err) {
                if (err.status !== 404) {
                  core.warning(`removeLabel failed: ${err.message}`);
                }
              }
            }

            // --- Act --------------------------------------------------
            if (satisfied) {
              core.info(
                'Claim satisfied: a linked issue is assigned to the PR author.'
              );
              await removeLabel();
              // Leave any prior warning in place but neutralize it.
              if (existing) {
                const resolved = [
                  MARKER,
                  '### Claim check: resolved',
                  '',
                  'The linked issue is now claimed by the PR author. This',
                  'advisory note no longer applies.',
                ].join('\n');
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body: resolved,
                });
              }
              return;
            }

            // Miss: build the advisory warning.
            const warning = [
              MARKER,
              '### Claim check (advisory)',
              '',
              "This PR's linked issue does not look claimed by the PR",
              'author. Anchor uses a cooperative claim ritual so two',
              'harnesses do not work the same issue at once.',
              '',
              ...reasons.map((r) => `- ${r}`),
              '',
              '**The ritual:** before writing code, self-assign the issue',
              '(`gh issue edit <n> --add-assignee @me`) and post a short',
              'claim comment. The assignee is the lock; assignment must',
              'come before the branch\'s first commit. See AGENTS.md',
              '"Claiming work".',
              '',
              '_This is advisory and does not block merge. The',
              '`unclaimed` label and this comment are the only signals._',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: warning,
              });
              core.info('Updated existing claim-check comment.');
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body: warning,
              });
              core.info('Posted claim-check warning comment.');
            }
            await addLabel();
            core.info('Claim check incomplete: signaled via comment + label.');
