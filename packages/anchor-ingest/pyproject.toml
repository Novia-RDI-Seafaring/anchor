[project]
name = "anchor-ingest"
version = "0.1.0"
description = "PDF ingestion pipeline — bronze/silver/gold extraction with CLI and MCP server"
requires-python = ">=3.12"
dependencies = [
    "docling>=2.63.0",
    "pymupdf>=1.27.2.2",
    "pydantic>=2.0",
    "openai>=1.0",
    "mcp>=1.27.0",
]

[project.optional-dependencies]
embed = ["llama-index-embeddings-azure-openai>=0.3.0"]

[project.scripts]
anchor-ingest = "anchor_ingest.cli:main"
anchor-ingest-mcp = "anchor_ingest.mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anchor_ingest"]
