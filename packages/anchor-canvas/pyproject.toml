[project]
name = "anchor-canvas"
version = "0.1.0"
description = "Interactive knowledge canvas — MCP server + web UI for agents and humans"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.30.0",
    "websockets>=12.0",
    "mcp>=1.27.0",
    "pydantic>=2.0",
    "httpx>=0.27.0",
]

[project.scripts]
anchor-canvas = "anchor_canvas.server:main"
anchor-canvas-mcp = "anchor_canvas.mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/anchor_canvas"]
